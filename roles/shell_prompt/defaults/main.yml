---
shell_prompt_starship_config: |
  "$schema" = 'https://starship.rs/config-schema.json'

  command_timeout = 5000
  [directory]
  truncation_length = 3
  truncate_to_repo = true
  truncation_symbol = '…/'

  [aws]
  disabled = false

  [terraform]
  format = 'using 💠($style) '

  [time]
  disabled = false

  [status]
  disabled = false

  [git_branch]
  symbol = '🌱 '

  [direnv]
  disabled = false

  [gcloud]
  disabled = true
